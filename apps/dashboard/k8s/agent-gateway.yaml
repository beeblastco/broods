apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-gateway
  labels:
    app: agent-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agent-gateway
  template:
    metadata:
      labels:
        app: agent-gateway
    spec:
      containers:
        - name: agent-gateway
          image: ghcr.io/your-org/clonee-agent-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: NEXT_PUBLIC_CONVEX_URL
              valueFrom:
                secretKeyRef:
                  name: agent-gateway-secrets
                  key: convex_url
            - name: GATEWAY_SHARED_SECRET
              valueFrom:
                secretKeyRef:
                  name: agent-gateway-secrets
                  key: gateway_shared_secret
            - name: AGENT_API_KEY_PEPPER
              valueFrom:
                secretKeyRef:
                  name: agent-gateway-secrets
                  key: agent_api_key_pepper
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-gateway-secrets
                  key: openai_api_key
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-gateway-secrets
                  key: anthropic_api_key
                  optional: true
            - name: GOOGLE_GENERATIVE_AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-gateway-secrets
                  key: google_ai_api_key
                  optional: true
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: agent-gateway-secrets
                  key: aws_region
            - name: AWS_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: agent-gateway-secrets
                  key: aws_s3_bucket
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: agent-gateway-secrets
                  key: aws_access_key_id
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-gateway-secrets
                  key: aws_secret_access_key
                  optional: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: agent-gateway
  labels:
    app: agent-gateway
spec:
  selector:
    app: agent-gateway
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agent-gateway
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: api.yourdomain.com
      http:
        paths:
          - path: /v1/agents
            pathType: Prefix
            backend:
              service:
                name: agent-gateway
                port:
                  number: 80
