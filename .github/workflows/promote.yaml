# One-click promotion: fast-forwards main to dev, then dispatches the main
# deploy workflows. Pushes made with GITHUB_TOKEN do not fire `on: push`
# workflows (recursion guard), so the production workflows are dispatched
# explicitly in dependency order and each must finish before the next starts.

name: Promote dev to main

on:
  workflow_dispatch:

concurrency:
  group: promote-main
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  promote:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Fast-forward main to dev
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin dev
          if git merge-base --is-ancestor origin/dev HEAD; then
            echo "main already contains dev; nothing to promote."
            echo "PROMOTED=false" >> "$GITHUB_ENV"
            exit 0
          fi
          if ! git merge-base --is-ancestor HEAD origin/dev; then
            echo "main has commits that are not on dev; refusing a non-fast-forward promote." >&2
            echo "Merge main back into dev first, then re-run this workflow." >&2
            exit 1
          fi

          git merge --ff-only origin/dev
          git push origin main
          echo "PROMOTED=true" >> "$GITHUB_ENV"
          echo "PROMOTED_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Trigger main deploys
        if: env.PROMOTED == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          dispatch_and_wait() {
            local workflow="$1"
            local dispatched_at run_id
            dispatched_at=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

            gh workflow run "$workflow" --ref main --repo "$GITHUB_REPOSITORY"

            for _ in $(seq 1 60); do
              run_id=$(gh api \
                "repos/$GITHUB_REPOSITORY/actions/workflows/$workflow/runs?branch=main&event=workflow_dispatch&per_page=20" \
                --jq "[.workflow_runs[] | select(.head_sha == \"$PROMOTED_SHA\" and .created_at >= \"$dispatched_at\")] | .[0].id // empty")
              if [[ -n "$run_id" ]]; then
                break
              fi
              sleep 2
            done

            if [[ -z "${run_id:-}" ]]; then
              echo "Timed out waiting for $workflow to start for $PROMOTED_SHA" >&2
              return 1
            fi

            gh run watch "$run_id" --exit-status --repo "$GITHUB_REPOSITORY"
          }

          # Convex schema/functions first, then the core that calls them. Build
          # the gateway after core is live, and the dashboard last.
          dispatch_and_wait deploy-convex.yaml
          dispatch_and_wait deploy.yaml
          dispatch_and_wait build-gateway.yaml
          dispatch_and_wait build-dashboard.yaml
