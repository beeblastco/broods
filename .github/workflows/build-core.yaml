name: Build Core Image

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'apps/core/**'
      - 'packages/convex/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/build-core.yaml'
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/beeblastco/broods-core

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      # Full tests run in ci.yaml; the branch already passed PR CI, so the
      # image build only re-checks types to keep publish latency low.
      - name: Type-check core
        run: bun run --filter @broods/core check

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/core/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
