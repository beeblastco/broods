# CI for community / OSS builds (PRs + non-main pushes).
# Validates the core SST app (DynamoDB path), SDK/Convex types, gateway, and
# dashboard before branch deployment workflows are allowed to become the first
# place cross-workspace failures appear.

name: CI

on:
  pull_request:
    paths-ignore:
      - 'apps/docs/**'
      - '.github/workflows/deploy-docs.yaml'
      - '**/*.md'
  push:
    branches-ignore:
      - main
    paths-ignore:
      - 'apps/docs/**'
      - '.github/workflows/deploy-docs.yaml'
      - '**/*.md'

jobs:
  validate:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      AWS_REGION: ${{ vars.DEV_AWS_REGION || 'us-east-1' }}
      # sst.config.ts reads these at runtime (no in-source defaults). The postinstall
      # `sst install` needs them set, or it fails with "Project name is required".
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME }}
      PROJECT_OWNER_EMAIL: ${{ vars.PROJECT_OWNER_EMAIL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: Install dependencies
        # Skip workspace postinstall (`sst install`). This validation job does
        # not deploy infrastructure, and `bun run check` / `bun run build`
        # regenerate the prompt artifacts they need.
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Typecheck
        run: bun run check

      - name: Prepare isolate runner
        # The real isolated-vm tests in apps/core/tests/isolate-executor.test.ts
        # skip unless BROODS_TEST_ISOLATE_RUNNER_PATH points at a runner with the
        # native addon built (Bun cannot load it; the tests spawn node).
        run: |
          mkdir -p /tmp/broods-ivm-test
          cp apps/core/src/harness/tools/isolate-runner/runner.mjs apps/core/src/harness/tools/isolate-runner/pinned-fetch.mjs /tmp/broods-ivm-test/
          npm install --prefix /tmp/broods-ivm-test isolated-vm@7.0.0
          echo "BROODS_TEST_ISOLATE_RUNNER_PATH=/tmp/broods-ivm-test/runner.mjs" >> "$GITHUB_ENV"

      - name: Run unit tests
        run: bun run test

      - name: Build Lambda binaries
        run: bun run build

  app-surfaces:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      NEXT_PUBLIC_CONVEX_URL: ${{ vars.NEXT_PUBLIC_CONVEX_URL || 'https://example.convex.cloud' }}
      NEXT_PUBLIC_WORKOS_REDIRECT_URI: ${{ vars.NEXT_PUBLIC_WORKOS_REDIRECT_URI || 'http://localhost:3000/auth/callback' }}
      NEXT_PUBLIC_BROODS_BASE_URL: https://gateway.broods.app
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Check gateway
        run: bun run --filter @broods/gateway check

      - name: Test gateway
        run: bun run --filter @broods/gateway test

      - name: Lint dashboard
        run: bun run --filter @broods/dashboard lint

      - name: Test dashboard
        run: bun run --filter @broods/dashboard test

      - name: Build dashboard
        run: bun run --filter @broods/dashboard build
