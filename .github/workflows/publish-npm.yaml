name: Publish npm Package

on:
  push:
    branches:
      - main
    paths:
      - "packages/broods/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/publish-npm.yaml"
  workflow_dispatch:

concurrency:
  group: publish-npm-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    # main-only; dispatching already requires write access, so manual re-runs
    # (e.g. after a transient publish failure) are allowed too.
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: Setup Node for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      # NOTE: no `npm install -g npm@latest` here — overwriting the bundled npm
      # in the hosted toolcache left it half-installed once ("Cannot find
      # module 'sigstore'" during the provenance publish).
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Read package version
        id: package
        shell: bash
        run: |
          set -euo pipefail

          PACKAGE_VERSION="$(node -p "require('./packages/broods/package.json').version")"
          echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing candidate: broods@$PACKAGE_VERSION"

      - name: Typecheck SDK
        run: bun run --filter broods check

      - name: Test SDK
        run: bun run --filter broods test

      - name: Pack check
        working-directory: packages/broods
        run: bun run pack:check

      - name: Check npm version availability
        id: npm-version
        shell: bash
        run: |
          set -euo pipefail

          PACKAGE_NAME="$(node -p "require('./packages/broods/package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./packages/broods/package.json').version")"
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published; skipping npm publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm-version.outputs.exists == 'false'
        working-directory: packages/broods
        run: npm publish
